<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Translator Pro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <h1>🌐 Translator Pro</h1>

  <!-- API CONFIG -->
  <div class="config">
    <input type="text" id="key" placeholder="🔑 Azure Key">
    <input type="text" id="endpoint" placeholder="🌍 Endpoint">
    <input type="text" id="location" placeholder="📍 Region">
  </div>

  <!-- TRANSLATOR -->
  <div class="translator">

    <!-- Language Bar -->
    <div class="lang-bar">
      <span>Auto Detect</span>

      <button id="swapBtn">⇄</button>

      <select id="targetLang">
        <option value="hi">Hindi</option>
        <option value="en">English</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
        <option value="de">German</option>
      </select>
    </div>

    <!-- Panels -->
    <div class="panels">

      <div class="panel">
        <textarea id="inputText" placeholder="Type or paste text..."></textarea>
        <div class="footer">
          <span id="charCount">0 characters</span>
        </div>
      </div>

      <div class="panel output">
        <textarea id="outputText" placeholder="Translation..." readonly></textarea>
        <div class="footer">
          <button onclick="copyText()">Copy</button>
        </div>
      </div>

    </div>

    <button class="translate-btn" onclick="translateText()">Translate</button>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
